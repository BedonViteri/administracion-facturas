name: CI/CD Administracion Facturas

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build con Maven
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: keylabedon/administracion:latest

      - name: Deploy en VM Azure
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          script: |
            docker pull keylabedon/administracion:latest
            docker stop administracion || true
            docker rm administracion || true
            docker run -d \
              --name administracion \
              -p 8081:8081 \
              --restart always \
              keylabedon/administracion:latest